name: CI

on:
  pull_request:
  push:
    branches:
      - master

env:
  V8_TAG: "v146.4.0"

jobs:
  mix_test:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
      TYREX_BUILD: "true"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    name: Elixir ${{ matrix.pair.elixir }} / OTP ${{ matrix.pair.otp }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - pair:
              elixir: 1.18.3
              otp: "27"
            lint: lint

    steps:
      - uses: actions/checkout@v6

      - name: Cache V8 archive
        id: v8-cache
        uses: actions/cache@v4
        with:
          path: /tmp/v8-archives/librusty_v8_x86_64-unknown-linux-gnu.a
          key: v8-archive-x86_64-unknown-linux-gnu-${{ env.V8_TAG }}-v1

      - name: Install V8 build dependencies
        if: steps.v8-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 ninja-build pkg-config libglib2.0-dev git
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 19
          echo "LIBCLANG_PATH=/usr/lib/llvm-19/lib" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          components: rustfmt

      - name: Clone rusty_v8
        if: steps.v8-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.V8_TAG }} --recurse-submodules \
            https://github.com/denoland/rusty_v8.git /tmp/v8build

      - name: Build V8 archive
        if: steps.v8-cache.outputs.cache-hit != 'true'
        working-directory: /tmp/v8build
        run: |
          export V8_FROM_SOURCE=1
          export EXTRA_GN_ARGS="v8_monolithic=true v8_monolithic_for_shared_library=true"
          echo "Building V8 for x86_64-unknown-linux-gnu"
          echo "EXTRA_GN_ARGS=$EXTRA_GN_ARGS"

          cargo build --release --target x86_64-unknown-linux-gnu 2>&1

          ARCHIVE=$(find target/x86_64-unknown-linux-gnu/release/gn_out -name "librusty_v8.a" 2>/dev/null | head -1)
          if [ -z "$ARCHIVE" ]; then
            ARCHIVE=$(find target/release/gn_out -name "librusty_v8.a" 2>/dev/null | head -1)
          fi
          if [ -z "$ARCHIVE" ]; then
            echo "ERROR: librusty_v8.a not found!"
            find target/ -name "librusty_v8*" 2>/dev/null
            exit 1
          fi

          echo "=== Verifying V8 archive TLS model ==="
          TPOFF=$(readelf -r "$ARCHIVE" 2>/dev/null | grep -c TPOFF32 || true)
          echo "TPOFF32 relocations: $TPOFF"
          if [ "$TPOFF" -gt 0 ]; then
            echo "::error::V8 archive has local-exec TLS relocations!"
            exit 1
          fi

          mkdir -p /tmp/v8-archives
          cp "$ARCHIVE" /tmp/v8-archives/librusty_v8_x86_64-unknown-linux-gnu.a
          ls -lh /tmp/v8-archives/librusty_v8_x86_64-unknown-linux-gnu.a

      - name: Configure V8 archive
        run: |
          echo "RUSTY_V8_ARCHIVE=/tmp/v8-archives/librusty_v8_x86_64-unknown-linux-gnu.a" >> $GITHUB_ENV
          # Ensure LIBCLANG_PATH is set even on cache hit
          if [ -z "$LIBCLANG_PATH" ]; then
            if [ ! -d "/usr/lib/llvm-19/lib" ]; then
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends pkg-config libglib2.0-dev
              wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
              chmod +x /tmp/llvm.sh
              sudo /tmp/llvm.sh 19
            fi
            echo "LIBCLANG_PATH=/usr/lib/llvm-19/lib" >> $GITHUB_ENV
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2-ci
          workspaces: |
            native/tyrex

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.pair.otp }}
          elixir-version: ${{ matrix.pair.elixir }}

      - name: Install dependencies
        run: mix deps.get

      - run: mix format --check-formatted
        if: ${{ matrix.lint }}

      - run: mix deps.unlock --check-unused
        if: ${{ matrix.lint }}

      - run: mix deps.compile

      - run: mix compile --warnings-as-errors
        if: ${{ matrix.lint }}

      - run: mix test

      - name: Run rustfmt
        run: cargo fmt --manifest-path=native/tyrex/Cargo.toml --all -- --check
