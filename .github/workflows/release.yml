name: Precomp NIFs

on:
  push:
    branches:
      - master
    paths:
      - "native/**"
      - ".github/workflows/release.yml"
    tags:
      - "*"
  pull_request:
    paths:
      - ".github/workflows/release.yml"
  workflow_dispatch:

env:
  V8_TAG: "v146.4.0"

jobs:
  # Build V8 archives with shared-library-compatible TLS model.
  # V8's prebuilt static libraries use local-exec TLS (TPOFF32/TLSLE)
  # which is incompatible with shared libraries loaded via dlopen (NIFs).
  # Must build from the full rusty_v8 repo with v8_monolithic=true and
  # v8_monolithic_for_shared_library=true to get local-dynamic TLS.
  # Always runs on x86_64 — Chromium's internal toolchain (clang, rustc)
  # is x86_64-only. Cross-compiles for aarch64 using Chromium's clang + sysroot.
  build_v8:
    name: V8 archive - ${{ matrix.target }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    steps:
      - name: Cache V8 archive
        id: v8-cache
        uses: actions/cache@v4
        with:
          path: /tmp/v8-archives/librusty_v8_${{ matrix.target }}.a
          key: v8-archive-${{ matrix.target }}-${{ env.V8_TAG }}-v4

      - name: Install build dependencies
        if: steps.v8-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 ninja-build pkg-config libglib2.0-dev git
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          echo "LIBCLANG_PATH=/usr/lib/llvm-20/lib" >> $GITHUB_ENV
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Install Rust toolchain
        if: steps.v8-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.target }}

      - name: Clone rusty_v8
        if: steps.v8-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.V8_TAG }} --recurse-submodules \
            https://github.com/denoland/rusty_v8.git /tmp/v8build

      - name: Build V8 archive
        if: steps.v8-cache.outputs.cache-hit != 'true'
        working-directory: /tmp/v8build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            mkdir -p .cargo
            printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' > .cargo/config.toml
          fi

          export V8_FROM_SOURCE=1
          export EXTRA_GN_ARGS="v8_monolithic=true v8_monolithic_for_shared_library=true"
          export PRINT_GN_ARGS=1
          echo "Building V8 for ${{ matrix.target }}"
          echo "V8_FROM_SOURCE=$V8_FROM_SOURCE"
          echo "EXTRA_GN_ARGS=$EXTRA_GN_ARGS"

          # Build will fail at bindgen step (Chromium libc++ headers incompatible
          # with system libclang), but librusty_v8.a is produced before that.
          # We only need the .a file; bindings come from the rusty_v8 release.
          cargo build --release --target ${{ matrix.target }} 2>&1 || true

          ARCHIVE=$(find target/${{ matrix.target }}/release/gn_out -name "librusty_v8.a" 2>/dev/null | head -1)
          if [ -z "$ARCHIVE" ]; then
            ARCHIVE=$(find target/release/gn_out -name "librusty_v8.a" 2>/dev/null | head -1)
          fi
          if [ -z "$ARCHIVE" ]; then
            echo "ERROR: librusty_v8.a not found!"
            find target/ -name "librusty_v8*" 2>/dev/null
            exit 1
          fi

          # Note: the .a archive may still have TPOFF32 relocations even with
          # v8_monolithic_for_shared_library=true. This is normal — the linker
          # performs TLS relaxation when building the final .so. The meaningful
          # check is on the output NIF .so (done in build_nif job).
          echo "=== V8 archive info ==="
          ls -lh "$ARCHIVE"
          TPOFF=$(readelf -r "$ARCHIVE" 2>/dev/null | grep -c TPOFF32 || true)
          echo "TPOFF32 in archive: $TPOFF (will be resolved by linker)"

          mkdir -p /tmp/v8-archives
          cp "$ARCHIVE" /tmp/v8-archives/librusty_v8_${{ matrix.target }}.a
          ls -lh /tmp/v8-archives/librusty_v8_${{ matrix.target }}.a

      - name: Upload V8 archive
        uses: actions/upload-artifact@v5
        with:
          name: v8-archive-${{ matrix.target }}
          path: /tmp/v8-archives/librusty_v8_${{ matrix.target }}.a

  # Build NIF for all platforms.
  # macOS: uses prebuilt V8 from crates.io (no custom V8 build needed).
  # Linux: uses custom V8 archive from build_v8 job.
  build_nif:
    name: NIF 2.16 - ${{ matrix.target }} (${{ matrix.os }})
    needs: [build_v8]
    if: always()
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin,      os: macos-14,         platform: macos }
          - { target: x86_64-apple-darwin,       os: macos-13,         platform: macos }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04-arm, platform: linux }
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-24.04,     platform: linux }

    steps:
      - name: Skip if V8 build failed (Linux only)
        if: matrix.platform == 'linux' && needs.build_v8.result != 'success'
        run: |
          echo "::error::V8 build failed, cannot build Linux NIF"
          exit 1

      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Extract project version
        shell: bash
        run: |
          echo "PROJECT_VERSION=$(sed -n 's/.*@version "\([^"]*\)".*/\1/p' mix.exs | head -n1)" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0

      - name: Add target
        shell: bash
        run: rustup target add ${{ matrix.target }}

      # --- Linux-specific steps ---

      - name: Download V8 archive
        if: matrix.platform == 'linux'
        uses: actions/download-artifact@v4
        with:
          name: v8-archive-${{ matrix.target }}
          path: /tmp/v8-archives

      - name: Download pre-generated V8 bindings
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          BINDING_FILE="src_binding_release_${{ matrix.target }}.rs"
          curl -L -o /tmp/v8-archives/$BINDING_FILE \
            "https://github.com/denoland/rusty_v8/releases/download/${{ env.V8_TAG }}/$BINDING_FILE"
          ls -lh /tmp/v8-archives/$BINDING_FILE

      - name: Configure V8 archive
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          ls -lh /tmp/v8-archives/
          ARCHIVE="/tmp/v8-archives/librusty_v8_${{ matrix.target }}.a"
          echo "RUSTY_V8_ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
          echo "RUSTY_V8_SRC_BINDING_PATH=/tmp/v8-archives/src_binding_release_${{ matrix.target }}.rs" >> $GITHUB_ENV

          echo "=== Verifying downloaded V8 archive ==="
          TPOFF=$(readelf -r "$ARCHIVE" 2>/dev/null | grep -c TPOFF32 || true)
          echo "TPOFF32 in downloaded archive: $TPOFF"
          if [ "$TPOFF" -gt 0 ]; then
            echo "::error::Downloaded V8 archive has TPOFF32 relocations!"
            exit 1
          fi

      - name: Install LLVM 20 (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libglib2.0-dev
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 20
          echo "LIBCLANG_PATH=/usr/lib/llvm-20/lib" >> $GITHUB_ENV

      # --- macOS-specific steps ---

      - name: Install LLVM 20 (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          brew install llvm
          LLVM_PREFIX="$(brew --prefix llvm)"
          echo "LIBCLANG_PATH=$LLVM_PREFIX/lib" >> $GITHUB_ENV
          echo "$LLVM_PREFIX/bin" >> $GITHUB_PATH

      # --- Common build steps ---

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v3-precomp
          shared-key: ${{ matrix.target }}-2.16
          workspaces: |
            native/tyrex

      - name: Build the project
        id: build-crate
        uses: philss/rustler-precompiled-action@v1.1.4
        with:
          project-name: tyrex
          project-version: ${{ env.PROJECT_VERSION }}
          target: ${{ matrix.target }}
          nif-version: "2.16"
          use-cross: false
          project-dir: "native/tyrex"

      - name: Verify no TPOFF32 relocations
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          SO_FILE=$(find native/tyrex/target/${{ matrix.target }}/release -name "libtyrex.so" -type f | head -1)
          if [ -n "$SO_FILE" ]; then
            TPOFF=$(readelf -r "$SO_FILE" 2>/dev/null | grep -c TPOFF32 || true)
            echo "TPOFF32 relocations: $TPOFF"
            if [ "$TPOFF" -gt 0 ]; then
              echo "::error::TPOFF32 relocations found in output - V8 TLS model is wrong"
              exit 1
            fi
          fi

      - name: Artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.build-crate.outputs.file-path }}

      - name: Artifact upload
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.build-crate.outputs.file-name }}
          path: ${{ steps.build-crate.outputs.file-path }}

      - name: Publish archives and packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.build-crate.outputs.file-path }}
        if: startsWith(github.ref, 'refs/tags/')
